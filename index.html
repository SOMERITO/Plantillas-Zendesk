<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormatVault Cloud - Registro de Plantillas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e5e7eb;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SCROLLBAR PERSONALIZADO */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* DISEÑO DIVIDIDO DINÁMICO */
        .creator-panel {
            width: 45%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: none; 
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .creator-panel.open { display: flex; }

        .repo-panel {
            width: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: width 0.3s;
        }

        .repo-panel.shrink { width: 55%; }

        /* HEADER */
        .repo-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .btn-toggle-panel {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-toggle-panel:hover { background-color: var(--accent-hover); }

        .panel-header-close {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-close-panel {
            background: none; border: none;
            font-size: 1.5rem; color: var(--text-muted);
            cursor: pointer; padding: 0;
        }

        h2 { font-size: 1.5rem; font-weight: 700; margin: 0; }

        /* FORMULARIO */
        .input-group { margin-bottom: 15px; }
        .input-field {
            width: 100%; padding: 12px 15px;
            border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 0.95rem;
            box-sizing: border-box; background-color: #f9fafb;
        }
        .input-field:focus { outline: none; border-color: var(--accent); background-color: #fff; }
        .input-title { text-transform: uppercase; }

        /* EDITOR */
        .editor-container {
            border: 1px solid var(--border); border-radius: 8px;
            display: flex; flex-direction: column;
            flex-grow: 1; margin-bottom: 20px;
            background-color: #fff; overflow: hidden;
        }

        .toolbar {
            padding: 10px; border-bottom: 1px solid var(--border);
            background-color: #f8fafc; display: flex; flex-wrap: wrap; gap: 8px;
        }

        .tool-btn {
            background: none; border: 1px solid transparent; border-radius: 4px;
            cursor: pointer; padding: 6px; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            min-width: 32px; height: 32px;
        }

        .tool-btn:hover { background-color: #e2e8f0; color: var(--text-main); }

        .rich-editor { flex-grow: 1; padding: 20px; overflow-y: auto; outline: none; font-size: 0.95rem; }
        .rich-editor:empty:before { content: attr(data-placeholder); color: #9ca3af; }

        /* FORMATO COMPACTO */
        .speech-box *, .rich-editor * { line-height: 1.5 !important; }
        .speech-box p, .speech-box div, .rich-editor p, .rich-editor div { margin: 0 0 12px 0 !important; }
        .speech-box p:last-child, .speech-box div:last-child { margin-bottom: 0 !important; }

        /* GRILLA VERTICAL */
        .cards-grid { display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .card {
            background-color: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card.editing { border-color: #059669; box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.2); }
        .card-title { font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .card-category {
            font-size: 0.75rem; background-color: #e0e7ff; color: #3730a3;
            padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase;
        }

        .speech-box {
            background-color: #f8fafc; border: 2px dashed #cbd5e1;
            border-radius: 8px; padding: 15px; font-size: 0.9rem;
            color: var(--text-muted); margin-bottom: 20px;
            cursor: pointer; position: relative;
        }

        .speech-box:hover { background-color: #eff6ff; border-color: var(--accent); border-style: solid; }
        .copy-hint {
            position: absolute; top: 10px; right: 10px; background-color: var(--accent);
            color: white; font-size: 0.7rem; font-weight: 700; padding: 4px 8px;
            border-radius: 12px; opacity: 0; transition: 0.2s;
        }
        .speech-box:hover .copy-hint { opacity: 1; }

        .card-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .btn-save {
            background-color: var(--accent); color: white; border: none;
            padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; flex-grow: 1;
        }
        .btn-save.update-mode { background-color: #059669; }
        .btn-cancel { background-color: #f3f4f6; padding: 14px; border-radius: 8px; cursor: pointer; display: none; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; background-color: var(--text-main);
            color: white; padding: 12px 24px; border-radius: 8px; transform: translateY(100px);
            opacity: 0; transition: 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">Conectando a la nube...</div>

    <aside class="creator-panel" id="creatorPanel">
        <div class="panel-header-close">
            <h2 id="panelTitle">Registrar Nuevo Speech</h2>
            <button class="btn-close-panel" onclick="toggleCreator(false)">×</button>
        </div>
        <div class="input-group">
            <input type="text" id="docTitle" class="input-field input-title" placeholder="TÍTULO DEL SPEECH" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="input-group">
            <input type="text" id="docCategory" class="input-field" placeholder="Etiqueta" list="categoryTags">
            <datalist id="categoryTags"></datalist>
        </div>
        <div class="editor-container">
            <div class="toolbar">
                <button class="tool-btn" onclick="execCmd('bold')">B</button>
                <button class="tool-btn" onclick="execCmd('italic')">I</button>
                <button class="tool-btn" onclick="execCmd('underline')">U</button>
                <button class="tool-btn" onclick="fixSpacing()" title="Varita Mágica" style="color: var(--accent);">🪄</button>
                <button class="tool-btn" onclick="clearFormat()" title="Borrar Formato" style="color: #ef4444;">🧹</button>
            </div>
            <div id="docEditor" class="rich-editor" contenteditable="true" data-placeholder="Escribe o pega aquí el speech..."></div>
        </div>
        <div class="action-buttons">
            <button id="btnCancelEdit" class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
            <button id="btnSaveMain" class="btn-save" onclick="saveDocument()">Guardar Speech</button>
        </div>
    </aside>

    <main class="repo-panel" id="repoPanel">
        <div class="repo-header">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar... (Ctrl + F)" oninput="renderGrid()">
            <button id="btnToggleCreator" class="btn-toggle-panel" onclick="toggleCreator(true)">+ Nuevo Speech</button>
        </div>
        <div id="filtersContainer" class="filters-container"></div>
        <div id="grid" class="cards-grid"></div>
    </main>

    <div id="toast" class="toast">Notificación</div>

    <script>
        const BIN_ID = '69cecea7856a682189f426a9';
        const API_KEY = '$2a$10$7PwFegDVLzoS8bJTQPdA7.27bk7D4odCTFnynWW1NkB5H6.PBt.nm';
        const CLOUD_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let database = [];
        let activeFilter = 'TODOS';
        let editingId = null;

        window.onload = loadFromCloud;

        async function loadFromCloud() {
            showLoading(true);
            try {
                const res = await fetch(`${CLOUD_URL}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                database = data.record || [];
                renderFilters();
                renderGrid();
            } catch (e) {
                showToast("Error al conectar con la nube");
            } finally {
                showLoading(false);
            }
        }

        async function syncToCloud() {
            showLoading(true);
            try {
                await fetch(CLOUD_URL, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY 
                    },
                    body: JSON.stringify(database)
                });
                showToast("Sincronizado con la nube");
            } catch (e) {
                showToast("Error al guardar en la nube");
            } finally {
                showLoading(false);
            }
        }

        function toggleCreator(open) {
            document.getElementById('creatorPanel').classList.toggle('open', open);
            document.getElementById('repoPanel').classList.toggle('shrink', open);
            document.getElementById('btnToggleCreator').style.display = open ? 'none' : 'block';
        }

        function execCmd(cmd) { document.execCommand(cmd, false, null); }

        function clearFormat() {
            document.execCommand('removeFormat', false, null);
            document.execCommand('foreColor', false, '#111827');
            document.getElementById('docEditor').focus();
        }

        function fixSpacing() {
            const editor = document.getElementById('docEditor');
            let html = editor.innerHTML;
            html = html.replace(/\s(style|class|color|size|face)="[^"]*"/gi, '');
            html = html.replace(/<h[1-6][^>]*>/gi, '<div>').replace(/<\/h[1-6]>/gi, '</div>');
            html = html.replace(/<\/?(span|font)[^>]*>/gi, '');
            html = html.replace(/<\/?(b|strong)[^>]*>/gi, '');
            editor.innerHTML = html;
            showToast("Estilo normalizado");
        }

        async function saveDocument() {
            const title = document.getElementById('docTitle').value.trim().toUpperCase();
            const cat = document.getElementById('docCategory').value.trim().toUpperCase() || 'GENERAL';
            const content = document.getElementById('docEditor').innerHTML;

            if (!title) return alert("Título requerido");

            if (editingId) {
                const idx = database.findIndex(d => d.id === editingId);
                database[idx] = { ...database[idx], title, category: cat, content };
                cancelEdit();
            } else {
                database.unshift({ id: Date.now().toString(), title, category: cat, content });
            }

            await syncToCloud();
            renderFilters();
            renderGrid();
            toggleCreator(false);
        }

        function editDocument(id) {
            const doc = database.find(d => d.id === id);
            document.getElementById('docTitle').value = doc.title;
            document.getElementById('docCategory').value = doc.category;
            document.getElementById('docEditor').innerHTML = doc.content;
            editingId = id;
            document.getElementById('panelTitle').innerText = "Editar Speech";
            document.getElementById('btnSaveMain').innerText = "Actualizar";
            document.getElementById('btnSaveMain').classList.add('update-mode');
            document.getElementById('btnCancelEdit').style.display = "block";
            toggleCreator(true);
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('docTitle').value = '';
            document.getElementById('docCategory').value = '';
            document.getElementById('docEditor').innerHTML = '';
            document.getElementById('panelTitle').innerText = "Registrar Nuevo Speech";
            document.getElementById('btnSaveMain').innerText = "Guardar Speech";
            document.getElementById('btnSaveMain').classList.remove('update-mode');
            document.getElementById('btnCancelEdit').style.display = "none";
        }

        async function deleteDocument(id) {
            if (confirm("¿Eliminar de la nube?")) {
                database = database.filter(d => d.id !== id);
                await syncToCloud();
                renderFilters();
                renderGrid();
            }
        }

        async function copyContent(id, el) {
            const doc = database.find(d => d.id === id);
            const blobHtml = new Blob([doc.content], { type: "text/html" });
            const blobText = new Blob([el.innerText], { type: "text/plain" });
            await navigator.clipboard.write([new ClipboardItem({ "text/html": blobHtml, "text/plain": blobText })]);
            el.style.backgroundColor = "#dcfce7";
            showToast("Copiado");
            setTimeout(() => el.style.backgroundColor = "", 1000);
        }

        function renderFilters() {
            const container = document.getElementById('filtersContainer');
            const cats = [...new Set(database.map(d => d.category))].sort();
            container.innerHTML = `<button class="filter-btn ${activeFilter==='TODOS'?'active':''}" onclick="setFilter('TODOS')">Todos</button>` +
                cats.map(c => `<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
            document.getElementById('categoryTags').innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        function setFilter(c) { activeFilter = c; renderFilters(); renderGrid(); }

        function renderGrid() {
            const query = document.getElementById('searchInput').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const grid = document.getElementById('grid');
            const filtered = database.filter(d => {
                const search = (d.title + d.category + d.content).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                return search.includes(query) && (activeFilter === 'TODOS' || d.category === activeFilter);
            });

            grid.innerHTML = filtered.map(d => `
                <div class="card ${editingId===d.id?'editing':''}">
                    <div class="card-header">
                        <div><div class="card-title">${d.title}</div><span class="card-category">${d.category}</span></div>
                    </div>
                    <div class="speech-box" onclick="copyContent('${d.id}', this)">
                        <div class="copy-hint">Copiar</div>${d.content}
                    </div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editDocument('${d.id}')">Editar</button>
                        <button class="btn-delete" onclick="deleteDocument('${d.id}')">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault(); document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
